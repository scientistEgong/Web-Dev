<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced To-Do List with Pomodoro</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="todo.css">
</head>
<body>

  <!-- Background decoration -->
  <div class="bg-orb bg-orb--1"></div>
  <div class="bg-orb bg-orb--2"></div>
  <div class="bg-grid"></div>

  <div class="container">

    <!-- Header -->
    <header class="header">
      <div class="header__meta">
        <span class="header__reg">23/EG/CO/027</span>
        <span class="header__dot"></span>
        <span class="header__course">CPE 314</span>
      </div>
      <h1 class="header__title">Task Manager</h1>
      <p class="header__sub">Stay focused. Ship it.</p>
    </header>

    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat">
        <span class="stat__num" id="statTotal">0</span>
        <span class="stat__lbl">Total</span>
      </div>
      <div class="stat">
        <span class="stat__num stat__num--done" id="statDone">0</span>
        <span class="stat__lbl">Done</span>
      </div>
      <div class="stat">
        <span class="stat__num stat__num--pending" id="statPending">0</span>
        <span class="stat__lbl">Pending</span>
      </div>
      <div class="stat">
        <span class="stat__num stat__num--overdue" id="statOverdue">0</span>
        <span class="stat__lbl">Overdue</span>
      </div>
    </div>

    <!-- Input section -->
    <div class="input-section">
      <div class="input-row">
        <div class="input-wrap input-wrap--grow">
          <svg class="input-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
            <circle cx="10" cy="10" r="8"/><line x1="10" y1="6" x2="10" y2="14"/><line x1="6" y1="10" x2="14" y2="10"/>
          </svg>
          <input type="text" id="taskInput" class="input-field" placeholder="What needs to be done?">
        </div>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
            <rect x="3" y="4" width="14" height="14" rx="2"/><line x1="3" y1="8" x2="17" y2="8"/><line x1="7" y1="2" x2="7" y2="6"/><line x1="13" y1="2" x2="13" y2="6"/>
          </svg>
          <input type="date" id="deadlineInput" class="input-field input-field--date">
        </div>
      </div>
      <div class="input-row input-row--controls">
        <div class="priority-group">
          <span class="priority-label">Priority:</span>
          <button class="pri-btn pri-btn--low active" data-priority="low">Low</button>
          <button class="pri-btn pri-btn--med" data-priority="medium">Medium</button>
          <button class="pri-btn pri-btn--high" data-priority="high">High</button>
        </div>
        <button id="addBtn" class="add-btn">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="10" y1="4" x2="10" y2="16"/><line x1="4" y1="10" x2="16" y2="10"/>
          </svg>
          Add Task
        </button>
      </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="pending">Pending</button>
      <button class="filter-btn" data-filter="done">Completed</button>
      <button class="filter-btn" data-filter="overdue">Overdue</button>
      <div class="filter-spacer"></div>
      <button class="clear-btn" id="clearDone">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" width="14" height="14">
          <polyline points="3 6 5 6 17 6"/><path d="M8 6V4h4v2"/><path d="M19 6l-1 12a2 2 0 01-2 2H4a2 2 0 01-2-2L1 6"/>
          <line x1="10" y1="11" x2="10" y2="15"/><line x1="7" y1="11" x2="7" y2="15"/><line x1="13" y1="11" x2="13" y2="15"/>
        </svg>
        Clear done
      </button>
    </div>

    <!-- Task list -->
    <ul id="taskList" class="task-list">
      <li class="task-empty" id="emptyState">
        <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.2" width="48" height="48">
          <rect x="12" y="8" width="40" height="48" rx="4"/>
          <line x1="22" y1="24" x2="42" y2="24"/>
          <line x1="22" y1="32" x2="42" y2="32"/>
          <line x1="22" y1="40" x2="34" y2="40"/>
        </svg>
        <p>No tasks yet. Add one above!</p>
      </li>
    </ul>

    <!-- Pomodoro Timer -->
    <div class="pomodoro" id="pomodoro">
      <div class="pomodoro__header">
        <h2 class="pomodoro__title">Pomodoro Timer</h2>
        <div class="pomodoro__mode-tabs">
          <button class="mode-tab active" data-mode="work" data-mins="25">Focus</button>
          <button class="mode-tab" data-mode="short" data-mins="5">Short Break</button>
          <button class="mode-tab" data-mode="long" data-mins="15">Long Break</button>
        </div>
      </div>

      <!-- Custom time inputs -->
      <div class="pomodoro__custom-times">
        <div class="custom-time-group">
          <label class="custom-time-label">Focus</label>
          <div class="custom-time-input-wrap">
            <button class="time-adj-btn" data-mode="work" data-delta="-1">−</button>
            <input type="number" class="custom-time-input" id="customWork" min="1" max="99" value="25">
            <button class="time-adj-btn" data-mode="work" data-delta="1">+</button>
          </div>
          <span class="custom-time-unit">min</span>
        </div>
        <div class="custom-time-group">
          <label class="custom-time-label">Short Break</label>
          <div class="custom-time-input-wrap">
            <button class="time-adj-btn" data-mode="short" data-delta="-1">−</button>
            <input type="number" class="custom-time-input" id="customShort" min="1" max="99" value="5">
            <button class="time-adj-btn" data-mode="short" data-delta="1">+</button>
          </div>
          <span class="custom-time-unit">min</span>
        </div>
        <div class="custom-time-group">
          <label class="custom-time-label">Long Break</label>
          <div class="custom-time-input-wrap">
            <button class="time-adj-btn" data-mode="long" data-delta="-1">−</button>
            <input type="number" class="custom-time-input" id="customLong" min="1" max="99" value="15">
            <button class="time-adj-btn" data-mode="long" data-delta="1">+</button>
          </div>
          <span class="custom-time-unit">min</span>
        </div>
      </div>

      <div class="pomodoro__ring-wrap">
        <svg class="pomodoro__ring" viewBox="0 0 220 220">
          <circle class="ring-bg" cx="110" cy="110" r="96"/>
          <circle class="ring-progress" id="ringProgress" cx="110" cy="110" r="96"/>
        </svg>
        <div class="pomodoro__center">
          <div id="timerDisplay" class="timer-display">25:00</div>
          <div class="timer-mode-label" id="timerModeLabel">Focus Session</div>
        </div>
      </div>

      <div class="pomodoro__controls">
        <button id="startTimer" class="pom-btn pom-btn--primary">
          <svg id="startIcon" viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
            <polygon points="5,3 19,10 5,17"/>
          </svg>
          <span id="startLabel">Start</span>
        </button>
        <button id="resetTimer" class="pom-btn pom-btn--ghost">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 102.13-9.36L1 10"/>
          </svg>
          Reset
        </button>
      </div>

      <div class="pomodoro__sessions">
        <span class="sessions-label">Sessions today:</span>
        <div class="sessions-dots" id="sessionDots"></div>
      </div>
    </div>

  </div><!-- /container -->

<script src="todo.js"></script>
</body>
</html>
