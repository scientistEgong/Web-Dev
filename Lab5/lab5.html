    <!-- JavaScript Demonstration -->
    <main>
        <p>Open the console to see JavaScript output, and try the greeting alert.</p>

        <script>
            // Example of declaring a variable
            let name = "Alice";
            console.log("Hello, " + name);

            // Function to greet a user
            function greet(user) {
                alert("Welcome, " + user + "!");
            }

            // Call the function
            greet("Bob");
        </script>
